<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Get the closest color from a different range">
    <meta name="author" content="gdvalderrama">

    <title>Color Approximator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="icon" href="assets/icon.png">
    <meta name="theme-color" content="#7952b3">

    <style>
      /* Custom styles for color swatch in select */
      select.color-swatch option::before {
        content: '\25A0  '; /* Unicode square character */
        margin-right: 5px;
        color: var(--option-color, black); /* Fallback to black */
      }
    </style>
  </head>

  <body class="bg-gray-100 font-sans leading-normal tracking-normal antialiased">

    <main class="container mx-auto max-w-4xl mt-10 p-4 sm:p-0">
      <div class="bg-gray-800 text-gray-100 px-6 py-8 rounded-lg shadow-xl text-center transition-all duration-200 ease-in-out">
        <h1 class="text-5xl font-extrabold mb-4">Color Approximator</h1>
        <p class="text-xl mb-3">
          Quickly find the closest color in a different paint range.
        </p>
        <p class="text-lg">
          Choose between popular ranges like Citadel, Vallejo, AK, and more.
        </p>
      </div>

      <div class="bg-white p-8 rounded-lg shadow-xl mt-8 transition-all duration-200 ease-in-out">
        <form id="color-form" method="POST" action="https://cepd8d48ok.execute-api.eu-west-1.amazonaws.com/get_closest_color" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div>
              <label for="paint_range_id" class="block text-gray-700 text-sm font-semibold mb-2">Paint Range</label>
              <div class="relative">
                <select id="paint_range_id" name="paint_range_id" class="block appearance-none w-full bg-gray-200 border border-gray-200 text-gray-700 py-3 px-4 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition duration-200 ease-in-out hover:border-gray-400" required>
                  <option value="" disabled selected>Choose a paint range...</option>
                  <option value="CPS">Citadel</option>
                  <option value="VMC">Vallejo Model</option>
                  <option value="VGC">Vallejo Game</option>
                  <option value="AKT">AK</option>
                  </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                  <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
              </div>
              <p class="text-red-500 text-xs italic mt-1 hidden transition-opacity duration-300" id="range-feedback">
                Please select a paint range.
              </p>
            </div>

            <div>
              <label for="color" class="block text-gray-700 text-sm font-semibold mb-2">Color (hex code)</label>
              <input type="text" id="color" name="color" placeholder="#0370b1" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ease-in-out hover:shadow-md" value="" required pattern="#[0-9a-fA-F]{6}">
              <p class="text-red-500 text-xs italic mt-1 hidden transition-opacity duration-300" id="color-feedback">
                Please enter a valid 6-digit hex code (e.g., #RRGGBB).
              </p>
              <div class="flex items-center mt-2">
                <button type="button" id="color-picker-button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded text-sm transition duration-200 ease-in-out">
                  Use color picker
                </button>
                <div id="selected-color-preview" class="w-8 h-8 rounded-full ml-3 border border-gray-300 shadow-inner cursor-pointer transition-transform duration-200 ease-in-out hover:scale-110" style="background-color: #0370b1;" title="Click to open color picker"></div>
              </div>
            </div>

          </div>

          <div class="text-center pt-6">
            <button type="submit" class="w-auto px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-lg shadow-md hover:shadow-lg transition duration-200 ease-in-out transform hover:-translate-y-1 active:translate-y-0 focus:outline-none focus:ring-4 focus:ring-blue-300">
              Get Color!
            </button>
          </div>
        </form>

        <div id="result" class="mt-8 transition-opacity duration-300 ease-in-out">
          </div>

      </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/vanilla-picker@2"></script>

    <script>
      const colorInput = document.getElementById('color');
      const colorPickerButton = document.getElementById('color-picker-button');
      const selectedColorPreview = document.getElementById('selected-color-preview');
      const form = document.getElementById('color-form');
      const resultDiv = document.getElementById('result');
      const rangeSelect = document.getElementById('paint_range_id');

      // Initialize Vanilla Picker
      const picker = new Picker({
        parent: colorPickerButton, // Attach to button
        color: colorInput.value || '#0370b1', // Set initial color
        alpha: false,
        editor: false, // Hide the text editor for simplicity if not needed
      });

      // Also allow clicking the color preview to open the picker
      selectedColorPreview.addEventListener('click', () => {
        picker.show();
      });

      picker.onDone = function(color) {
        const hex = color.hex.substring(0, 7); // Ensure #RRGGBB format
        colorInput.value = hex;
        selectedColorPreview.style.backgroundColor = hex;
        validateInput(colorInput); // Validate on color pick
      };

      picker.onChange = function(color) {
        const hex = color.hex.substring(0, 7);
        colorInput.value = hex; // Live update during drag
        selectedColorPreview.style.backgroundColor = hex;
      };

      // Live update color preview when typing in hex code
      colorInput.addEventListener('input', () => {
        const value = colorInput.value;
        if (/^#[0-9a-fA-F]{6}$/.test(value)) {
          selectedColorPreview.style.backgroundColor = value;
          colorInput.classList.remove('border-red-500');
          document.getElementById('color-feedback').classList.add('hidden');
        } else {
          selectedColorPreview.style.backgroundColor = '#cccccc'; // Grey out if invalid
        }
      });

      // Basic form validation
      function validateInput(inputElement) {
        const feedbackElement = document.getElementById(`${inputElement.id}-feedback`);
        if (!inputElement.checkValidity()) {
          inputElement.classList.add('border-red-500');
          if (feedbackElement) {
            feedbackElement.classList.remove('hidden');
            feedbackElement.style.opacity = '1';
          }
          return false;
        } else {
          inputElement.classList.remove('border-red-500');
          if (feedbackElement) {
            feedbackElement.style.opacity = '0';
            setTimeout(() => feedbackElement.classList.add('hidden'), 300); // Hide after transition
          }
          return true;
        }
      }

      colorInput.addEventListener('blur', () => validateInput(colorInput));
      rangeSelect.addEventListener('blur', () => validateInput(rangeSelect));
      rangeSelect.addEventListener('change', () => validateInput(rangeSelect));


      form.addEventListener('submit', async event => {
        event.preventDefault();

        // Validate all fields before submission
        const isRangeValid = validateInput(rangeSelect);
        const isColorValid = validateInput(colorInput);

        if (!isRangeValid || !isColorValid) {
          resultDiv.innerHTML = `<div class="bg-yellow-100 border border-yellow-400 text-yellow-700 px-4 py-3 rounded relative opacity-0" role="alert">
            <strong class="font-bold">Heads up!</strong>
            <span class="block sm:inline">Please correct the errors in the form.</span>
          </div>`;
          resultDiv.querySelector('div').style.opacity = '1'; // Trigger opacity transition
          return;
        }

        // Show loading spinner
        resultDiv.innerHTML = `<div class="flex items-center justify-center p-4 opacity-0">
                                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900"></div>
                                <div class="ml-3 text-gray-700">Finding the closest color...</div>
                              </div>`;
        resultDiv.querySelector('div').style.opacity = '1'; // Trigger opacity transition


        let data = JSON.stringify(Object.fromEntries(new FormData(form)));

        let axiosConfig = {
          headers: {
            'Content-Type': 'application/json'
          }
        };

        try {
          const response = await axios.post(form.action, data, axiosConfig);
          const newColor = response.data;
          // {"name": "Blue Fluorescent", "paint_type": "Fluorescent", "paint_color": "#0370b1", "difference": 110.6752004741803}
          resultDiv.innerHTML = `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative opacity-0" role="alert">
            <strong class="font-bold">Success!</strong>
            <span class="block sm:inline">The closest color is <span class="font-semibold text-blue-800">${newColor.name}</span> <span style="color:${newColor.paint_color}">&#9632;</span></span>
            <p class="text-sm mt-2">Paint Type: <span class="font-medium">${newColor.paint_type}</span></p>
            <p class="text-sm">Hex Code: <span class="font-medium">${newColor.paint_color}</span></p>
            <p class="text-sm">Difference Score: <span class="font-medium">${newColor.difference.toFixed(2)}</span></p>
          </div>`;
          resultDiv.querySelector('div').style.opacity = '1'; // Trigger opacity transition
        } catch (errors) {
          console.error(errors);
          resultDiv.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative opacity-0" role="alert">
            <strong class="font-bold">Fail!</strong>
            <span class="block sm:inline">There was an error, please try again :(</span>
          </div>`;
          resultDiv.querySelector('div').style.opacity = '1'; // Trigger opacity transition
        }
      });
    </script>
  </body>
</html>
