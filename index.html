<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Find the closest matching paint color across popular ranges like Citadel, Vallejo, AK, and more.">
    <meta name="author" content="gdvalderrama">

    <!-- Open Graph / Social meta tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Color Approximator">
    <meta property="og:description" content="Find the closest matching paint color across popular ranges like Citadel, Vallejo, AK, and more.">
    <meta property="og:url" content="https://guiomar.xyz/color-hobby-front/">
    <meta property="og:image" content="https://guiomar.xyz/color-hobby-front/assets/icon.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Color Approximator">
    <meta name="twitter:description" content="Find the closest matching paint color across popular ranges like Citadel, Vallejo, AK, and more.">
    <meta name="twitter:image" content="https://guiomar.xyz/color-hobby-front/assets/icon.png">

    <title>Color Approximator</title>

    <link rel="stylesheet" href="assets/css/tailwind.min.css">

    <link rel="icon" href="assets/icon.png">
    <meta name="theme-color" content="#7952b3">

  </head>

  <body class="bg-gray-100 font-sans leading-normal tracking-normal antialiased">

    <main class="container mx-auto max-w-4xl mt-10 p-4 sm:p-0">
      <div class="bg-gray-800 text-gray-100 px-6 py-8 rounded-lg shadow-xl text-center transition-all duration-200 ease-in-out">
        <h1 class="text-5xl font-extrabold mb-4">Color Approximator</h1>
        <p class="text-xl mb-3">
          Quickly find the closest color in a different paint range.
        </p>
        <p class="text-lg">
          Choose between popular ranges like Citadel, Vallejo, AK, and more.
        </p>
      </div>

      <div class="bg-white p-8 rounded-lg shadow-xl mt-8 transition-all duration-200 ease-in-out">
        <form id="color-form" method="POST" action="https://cepd8d48ok.execute-api.eu-west-1.amazonaws.com/get_closest_color" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div>
              <label for="paint_range_id" class="block text-gray-700 text-sm font-semibold mb-2">Paint Range</label>
              <div class="relative">
                <select id="paint_range_id" name="paint_range_id" class="block appearance-none w-full bg-gray-200 border border-gray-200 text-gray-700 py-3 px-4 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition duration-200 ease-in-out hover:border-gray-400" required>
                  <option value="" disabled selected>Choose a paint range...</option>
                  <option value="CPS">Citadel</option>
                  <option value="VMC">Vallejo Model</option>
                  <option value="VGC">Vallejo Game</option>
                  <option value="AKT">AK</option>
                  </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                  <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
              </div>
              <p class="text-red-500 text-xs italic mt-1 hidden transition-opacity duration-300" id="range-feedback">
                Please select a paint range.
              </p>
            </div>

            <div>
              <label for="color" class="block text-gray-700 text-sm font-semibold mb-2">Color (hex code)</label>
              <input type="text" id="color" name="color" placeholder="#0370b1" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200 ease-in-out hover:shadow-md" value="" required pattern="#[0-9a-fA-F]{6}">
              <p class="text-red-500 text-xs italic mt-1 hidden transition-opacity duration-300" id="color-feedback">
                Please enter a valid 6-digit hex code (e.g., #RRGGBB).
              </p>
              <div class="flex items-center mt-2">
                <button type="button" id="color-picker-button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded text-sm transition duration-200 ease-in-out">
                  Use color picker
                </button>
                <div id="selected-color-preview" class="w-8 h-8 rounded-full ml-3 border border-gray-300 shadow-inner cursor-pointer transition-transform duration-200 ease-in-out hover:scale-110" style="background-color: #0370b1;" title="Click to open color picker"></div>
              </div>
            </div>

          </div>

          <div class="text-center pt-6">
            <button type="submit" class="w-auto px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-lg shadow-md hover:shadow-lg transition duration-200 ease-in-out transform hover:-translate-y-1 active:translate-y-0 focus:outline-none focus:ring-4 focus:ring-blue-300">
              Get Color!
            </button>
          </div>
        </form>

        <div id="result" class="mt-8 transition-opacity duration-300 ease-in-out">
          </div>

      </div>

    </main>

    <script src="assets/js/vanilla-picker.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
